# Minimal CKAN config for the integration stack.
# Real production deployments should derive their own ckan.ini.

[DEFAULT]
debug = false

[app:main]
ckanext.datapusher_plus.api_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJ4dFRnTzNfVUpEaklYdU4tTFlad2ZDTjQzUUdqUWFNaFhJOEtMNnZIcGxvIiwiaWF0IjoxNzc4OTc4NDQyfQ.LRveztupIeyEh226crELOSPWscyZDDzRCNUeG3qC74E
use = egg:ckan
ckan.site_id = default
# Must be the docker-network hostname (``ckan``), not ``localhost``:
# resource URLs derived from this end up being fetched by the
# prefect-worker container, where ``localhost`` resolves to the worker
# itself. ``http://ckan:5000`` works from any service in the integration
# stack. Host-side tests reach CKAN via their own env-configurable
# ``CKAN_URL=http://localhost:5050``.
ckan.site_url = http://ckan:5000

# Throwaway secret for the integration stack. Required by CKAN 2.11+;
# rotated on every fresh checkout has no security impact because this
# config never leaves a dev / CI container.
SECRET_KEY = integration-stack-not-a-real-secret-do-not-deploy
beaker.session.secret = integration-stack-not-a-real-secret-do-not-deploy
ckan.plugins = datastore datapusher_plus
ckan.auth.create_dataset_if_not_in_organization = true
ckan.auth.create_unowned_dataset = true
ckan.auth.anon_create_dataset = true

# Database
sqlalchemy.url = postgresql://ckan:ckan@postgres/ckan
ckan.datastore.write_url = postgresql://datastore_write:datastore@postgres/datastore
ckan.datastore.read_url = postgresql://datastore_read:datastore@postgres/datastore

# Redis (CKAN's own; DP+ no longer uses it)
ckan.redis.url = redis://redis:6379/1

# Solr
solr_url = http://solr:8983/solr/ckan

# DataPusher+
ckanext.datapusher_plus.qsv_bin = /usr/local/bin/qsvdp
ckanext.datapusher_plus.prefect_deployment_name = datapusher-plus/datapusher-plus
ckanext.datapusher_plus.prefect_work_pool = datapusher-plus
ckanext.datapusher_plus.prefect_ui_base = http://localhost:4200
ckanext.datapusher_plus.flow_timeout = 600
ckanext.datapusher_plus.max_quarantine_pct = 5.0

[loggers]
keys = root, ckan

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_ckan]
level = DEBUG
handlers =
qualname = ckan

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
